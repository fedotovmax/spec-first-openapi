package: api_v1
output: pkg/openapi/api/v1/api.gen.go
generate:
  chi-server: true
  models: true
  strict-server: true

output-options:
  nullable-type: false
  type-mapping:
    string: # Указываем базовый тип OpenAPI
      formats: # Секция для маппинга форматов этого типа
        email:
          type: string
        ipv4:
          type: string
        uuid:
          type: string
  
import-mapping:
  request: github.com/fedotovmax/spec-first-openapi/transport/http/request