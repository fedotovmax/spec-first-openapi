version: '3'

dotenv: ['.env']

vars:
 # API_VERSIONS: ["v1"]

  API_VERSIONS:
    sh: ls -d {{.ROOT_DIR}}/openapi/src/v*/ 2>/dev/null | xargs -I{} basename {}

  NODE_MODULES_BIN: "{{.ROOT_DIR}}/node_modules/.bin"
  REDOCLY: "{{.NODE_MODULES_BIN}}/redocly"

  OAPI_CODEGEN_VERSION: "v2.6.0"

  PROJECT_GOBIN: "{{.ROOT_DIR}}/go/bin"
  OAPI_CODEGEN: "{{.PROJECT_GOBIN}}/oapi-codegen"
  OPERATION_ID_TOOL: "{{.PROJECT_GOBIN}}/operation-id"

  GO_API_APP_ENTRYPOINT: "{{.ROOT_DIR}}/cmd/api"
  GO_API_CLIENT_APP_ENTRYPOINT: "{{.ROOT_DIR}}/cmd/client"
  OPERATION_ID_TOOL_PATH: "{{.ROOT_DIR}}/cmd/tools/operation-id"

  APPS_BIN: "{{.ROOT_DIR}}/bin"

  SWAGGER_UI_TOOL: "{{.PROJECT_GOBIN}}/swagger-ui"
  SWAGGER_UI_TOOL_PATH: "{{.ROOT_DIR}}/cmd/tools/swagger-ui"
  SWAGGER_OUTPUT: "{{.ROOT_DIR}}/pkg/openapi/swagger/swagger.gen.go"

  OAPI_SERVER_TPL: "{{.ROOT_DIR}}/oapi-server.yaml.tpl"
  OAPI_CLIENT_TPL: "{{.ROOT_DIR}}/oapi-client.yaml.tpl"

tasks:
  tt:
    cmds:
      - echo "{{.API_VERSIONS_TEST}}"
  # --- Твои установки БЕЗ изменений ---
  redocly-cli:install:
    silent: true
    desc: Установить локально Redocly CLI
    status:
     - "[ -f {{.REDOCLY}} ]"
    cmds:
      - echo "📦 Устанавливаем redocly-cli..."
      - npm ci

  operation-id-tool:install:
    silent: true
    desc: "Скачивает operation-id-tool в папку go/bin проекта"
    status: 
      - "[ -f {{.OPERATION_ID_TOOL}} ]"
    cmds:
      - echo "📦 Устанавливаем operation-id-tool..."
      - mkdir -p {{.PROJECT_GOBIN}}
      - GOBIN={{.PROJECT_GOBIN}} go install {{.OPERATION_ID_TOOL_PATH}}

  oapi-codegen:install:
    silent: true
    desc: "Скачивает oapi-codegen в подобных папку go/bin проекта"
    status: 
      - "[ -f {{.OAPI_CODEGEN}} ]"
    cmds:
       - echo "📦 Устанавливаем oapi-codegen..."
       - mkdir -p {{.PROJECT_GOBIN}}
       - GOBIN={{.PROJECT_GOBIN}} go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@{{.OAPI_CODEGEN_VERSION}}

  swagger-ui-tool:install:
    silent: true
    status:
      - "[ -f {{.SWAGGER_UI_TOOL}} ]"
    cmds:
      - echo "📦 Устанавливаем swagger-ui-tool..."
      - mkdir -p {{.PROJECT_GOBIN}}
      - GOBIN={{.PROJECT_GOBIN}} go install {{.SWAGGER_UI_TOOL_PATH}}

  swagger:gen:
    silent: true
    deps: [swagger-ui-tool:install]
    cmds:
      - echo "🛠️ Генерация кода для swagger-ui..."
      - mkdir -p {{.ROOT_DIR}}/pkg/openapi/swagger/bundles
      - "{{.SWAGGER_UI_TOOL}} -bundles {{.ROOT_DIR}}/openapi/bundles -out {{.SWAGGER_OUTPUT}}"

  oapi-codegen:gen-v:
    silent: true
    internal: true
    deps: [ oapi-codegen:install, operation-id-tool:install, redocly-cli:install]
    vars:
      SOURCE_FILE: "{{.ROOT_DIR}}/openapi/src/{{.V}}/{{.V}}.openapi.yaml"
      BUNDLE_FILE_YAML: "{{.ROOT_DIR}}/openapi/bundles/{{.V}}.openapi.bundle.yaml"
      BUNDLE_FILE_JSON: "{{.ROOT_DIR}}/openapi/bundles/{{.V}}.openapi.bundle.json"
      TARGET_DIR: "{{.ROOT_DIR}}/pkg/openapi/api/{{.V}}"
      CLIENT_DIR: "{{.ROOT_DIR}}/pkg/openapi/client/{{.V}}"
      OPS_OUTPUT: "{{.ROOT_DIR}}/pkg/openapi/operations_{{.V}}/operations.go"
      TMP_SRV_CONFIG: "{{.TARGET_DIR}}/oapi-server.tmp.yaml"
      TMP_CLI_CONFIG: "{{.CLIENT_DIR}}/oapi-client.tmp.yaml"
      SAFE_V:
        sh: echo '{{.V}}' | tr '-' '_' | tr '.' '_'
    cmds:
      # 1. Сборка бандла
      - echo "🛠️ Сборка бандла для версии {{.V}}..."
      - rm -rf {{.ROOT_DIR}}/openapi/bundles
      - mkdir -p {{.ROOT_DIR}}/openapi/bundles
      - "{{.REDOCLY}} bundle {{.SOURCE_FILE}} -o {{.BUNDLE_FILE_YAML}}"
      - "{{.REDOCLY}} bundle {{.SOURCE_FILE}} -o {{.BUNDLE_FILE_JSON}}"

      # 2. Очистка и создание папок
      - echo "🧹 Подготовка папок для {{.V}}..."
      - rm -rf {{.ROOT_DIR}}/pkg/openapi
      - mkdir -p {{.TARGET_DIR}} {{.CLIENT_DIR}}

      # 3. Генерация СЕРВЕРА через доп таску
      - echo "⚙️ Генерация СЕРВЕРА для {{.V}}..."
      - task: internal:codegen
        vars:
          TPL: "{{.OAPI_SERVER_TPL}}"
          TMP_CONFIG: "{{.TMP_SRV_CONFIG}}"
          PACKAGE: "api_{{.SAFE_V}}"
          OUTPUT_FILE: "{{.TARGET_DIR}}/api.gen.go"
          BUNDLE: "{{.BUNDLE_FILE_YAML}}"

      # 4. Генерация КЛИЕНТА через доп таску
      - echo "⚙️ Генерация КЛИЕНТА для {{.V}}..."
      - task: internal:codegen
        vars:
          TPL: "{{.OAPI_CLIENT_TPL}}"
          TMP_CONFIG: "{{.TMP_CLI_CONFIG}}"
          PACKAGE: "client_{{.SAFE_V}}"
          OUTPUT_FILE: "{{.CLIENT_DIR}}/client.gen.go"
          BUNDLE: "{{.BUNDLE_FILE_YAML}}"

      # 5. ID операций
      - echo "🆔 Генерация ID операций для {{.V}}..."
      - mkdir -p $(dirname {{.OPS_OUTPUT}})
      - "{{.OPERATION_ID_TOOL}} -spec {{.BUNDLE_FILE_YAML}} -out {{.OPS_OUTPUT}} -package operations_{{.SAFE_V}}"

  # Дополнительная таска для инкапсуляции логики шаблонизации и генерации
  internal:codegen:
    internal: true
    silent: true
    cmds:
      - |
        printf 'package: %s\noutput: %s\n' \
          '{{.PACKAGE}}' '{{.OUTPUT_FILE}}' > {{.TMP_CONFIG}}.tmp
        cat {{.TPL}} >> {{.TMP_CONFIG}}.tmp
        mv {{.TMP_CONFIG}}.tmp {{.TMP_CONFIG}}
      - "{{.OAPI_CODEGEN}} -config {{.TMP_CONFIG}} {{.BUNDLE}}"
      - rm {{.TMP_CONFIG}}

  
  # --- Главная точка входа ---
  openapi:gen:
    desc: "Генерировать все версии API"
    cmds:
      - for: { var: API_VERSIONS }
        task: oapi-codegen:gen-v
        vars: { V: "{{.ITEM}}" }
      - task: swagger:gen

  go-api:run:
    silent: true
    desc: "Запуск API Server Go"
    cmds:
      - echo "🏁 Запуск go приложения"
      - go run {{.GO_API_APP_ENTRYPOINT}}/main.go


  go-api:run-binary:
    silent: true
    desc: "Запуск API Server Go (Binary)"
    cmds:
      - echo "🏁 Запуск go приложения из бинарного файла"
      - "{{.APPS_BIN}}/api"
      

  go-api:build:
    silent: true
    desc: "🛠️ Сборка API Server Go"
    cmds:
      - echo "🛠️ Сборка API Server Go"
      - CGO_ENABLED=0 go build -ldflags="-s -w" -o {{.APPS_BIN}}/api {{.GO_API_APP_ENTRYPOINT}}


  go-client:run:
    silent: true
    desc: "Запуск API Client Go"
    cmds:
      - echo "🏁 Запуск go приложения"
      - go run {{.GO_API_CLIENT_APP_ENTRYPOINT}}/main.go


  go-client:run-binary:
    silent: true
    desc: "Запуск API client Go (Binary)"
    cmds:
      - echo "🏁 Запуск go приложения из бинарного файла"
      - "{{.APPS_BIN}}/client"
      

  go-client:build:
    silent: true
    desc: "🛠️ Сборка API client Go"
    cmds:
      - echo "🛠️ Сборка API client Go"
      - CGO_ENABLED=0 go build -ldflags="-s -w" -o {{.APPS_BIN}} {{.GO_API_CLIENT_APP_ENTRYPOINT}}